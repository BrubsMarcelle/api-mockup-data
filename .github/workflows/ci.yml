name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    
    env:
      MONGO_URI: mongodb://localhost:27017
      DATABASE_NAME: test_db
      ENVIRONMENT: dev
      SECRET_KEY: test_secret
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest httpx
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run tests with coverage
      run: |
        pytest --cov=app --cov-report=xml:coverage.xml --ignore=scratch

    - name: SonarCloud Scan
      if: env.SONAR_TOKEN != ''
      uses: sonarsource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.organization=bmg-dev
          -Dsonar.projectKey=BrubsMarcelle_api-mockup-data
          -Dsonar.python.coverage.reportPaths=coverage.xml
          -Dsonar.sources=app
          -Dsonar.verbose=true

  deploy:
    name: Deploy to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    # Só faz deploy quando há push na branch main (não em PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write  # Necessário para autenticação com Workload Identity

    env:
      PROJECT_ID: mockup-data-api
      PROJECT_NUMBER: "738806522716"   # Número do projeto GCP (gcloud projects describe mockup-data-api --format="value(projectNumber)")
      REGION: southamerica-east1
      SERVICE_NAME: api-mockup-data
      IMAGE: southamerica-east1-docker.pkg.dev/mockup-data-api/mockup-data-api/api:${{ github.sha }}

    steps:
    - uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker southamerica-east1-docker.pkg.dev --quiet

    - name: Build Docker Image
      run: docker build --tag ${{ env.IMAGE }} .

    - name: Push Docker Image to Artifact Registry
      run: docker push ${{ env.IMAGE }}


    - name: Deploy to Cloud Run
      run: |
        # --no-allow-unauthenticated aqui para evitar falha de IAM no deploy
        # O acesso público é concedido no passo seguinte separadamente
        gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image ${{ env.IMAGE }} \
          --platform managed \
          --region ${{ env.REGION }} \
          --no-allow-unauthenticated \
          --port 8080 \
          --set-env-vars "DATABASE_TYPE=firestore,FIREBASE_PROJECT_ID=${{ env.PROJECT_ID }},ENVIRONMENT=prod,RELOAD=false,DATABASE_NAME=api_mock_db,ALGORITHM=HS256,ACCESS_TOKEN_EXPIRE_MINUTES=480" \
          --set-secrets "SECRET_KEY=SECRET_KEY:latest"
